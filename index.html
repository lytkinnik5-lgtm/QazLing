<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0f62fe" />
  <meta name="description" content="QazLing — геймифицированная платформа для изучения казахского языка с AI-наставником, уровнями, достижениями и квизами." />
  <title>QazLing — Учи казахский с удовольствием</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            canvas: "#f0f2f8",
            surface: "#ffffff",
            line: "#e2e5f0",
            ink: "#0d0f1a",
            muted: "#6b718e",
            brand: { DEFAULT: "#0f62fe", dark: "#0043ce", soft: "#dde8ff" },
            accent: { DEFAULT: "#ee5396", dark: "#bf4070", soft: "#ffe0ef" },
            gold: { DEFAULT: "#f1c21b", soft: "#fdf5c2" },
            ok: "#24a148",
            bad: "#da1e28",
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
            serif: ['Playfair Display', 'Georgia', 'serif'],
          },
          boxShadow: {
            soft: "0 1px 3px rgba(13,15,26,.06), 0 8px 28px -8px rgba(13,15,26,.10)",
            lift: "0 8px 32px -8px rgba(15,98,254,.55)",
            glow: "0 0 0 1px rgba(15,98,254,.10), 0 20px 60px -16px rgba(15,98,254,.40)",
            gold: "0 8px 32px -8px rgba(241,194,27,.6)",
          },
          borderRadius: { xl2: "1.25rem", xl3: "1.75rem" },
        },
      },
    };
  </script>
  <style>
    *{ -webkit-tap-highlight-color: transparent; box-sizing: border-box; }

    body{
      font-family:'Inter',system-ui,sans-serif; color:#0d0f1a;
      background:
        radial-gradient(ellipse 800px 500px at 100% -5%, rgba(238,83,150,.08), transparent 60%),
        radial-gradient(ellipse 900px 600px at -5% 10%, rgba(15,98,254,.09), transparent 55%),
        radial-gradient(ellipse 600px 400px at 60% 90%, rgba(15,98,254,.05), transparent 60%),
        #f0f2f8;
      min-height: 100vh;
    }

    ::-webkit-scrollbar{ width:8px; height:8px; }
    ::-webkit-scrollbar-thumb{ background:#cdd0e0; border-radius:99px; border:2px solid #f0f2f8; }
    ::-webkit-scrollbar-thumb:hover{ background:#b4b8cc; }

    /* ── Brand gradient text ── */
    .grad-text{
      background: linear-gradient(110deg, #0f62fe 0%, #6929c4 50%, #ee5396 100%);
      -webkit-background-clip: text; background-clip: text; color: transparent;
    }

    /* ── Brand gradient bg ── */
    .grad-bg{
      background: linear-gradient(135deg, #0f62fe 0%, #6929c4 55%, #ee5396 100%);
    }

    /* ── Noise texture overlay for glass cards ── */
    .glass{
      background: rgba(255,255,255,.72);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border: 1px solid rgba(255,255,255,.9);
    }

    /* ── Kazakh shanyrak pattern watermark ── */
    .ornament{ position:relative; isolation:isolate; }
    .ornament::before{
      content:""; position:absolute; inset:0; z-index:0; border-radius:inherit; opacity:.06;
      background-image:url("data:image/svg+xml,%3Csvg width='120' height='120' viewBox='0 0 120 120' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' stroke='%23ffffff' stroke-width='2' stroke-linecap='round'%3E%3Ccircle cx='60' cy='60' r='30'/%3E%3Ccircle cx='60' cy='60' r='18'/%3E%3Cline x1='60' y1='14' x2='60' y2='30'/%3E%3Cline x1='60' y1='90' x2='60' y2='106'/%3E%3Cline x1='14' y1='60' x2='30' y2='60'/%3E%3Cline x1='90' y1='60' x2='106' y2='60'/%3E%3Cline x1='28' y1='28' x2='38' y2='38'/%3E%3Cline x1='82' y1='82' x2='92' y2='92'/%3E%3Cline x1='92' y1='28' x2='82' y2='38'/%3E%3Cline x1='28' y1='92' x2='38' y2='82'/%3E%3C/g%3E%3C/svg%3E");
      background-size: 120px 120px;
    }
    .ornament > *{ position:relative; z-index:1; }

    /* ── Logo mark ── */
    .logo-mark{
      background: linear-gradient(135deg, #0f62fe, #6929c4);
      border-radius: 14px;
      display: grid; place-items: center;
      font-weight: 900; color: white;
      font-size: 1rem; letter-spacing: -.02em;
      box-shadow: 0 4px 16px rgba(15,98,254,.4);
      position: relative; overflow: hidden;
    }
    .logo-mark::after{
      content: ""; position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,.25) 0%, transparent 60%);
      border-radius: inherit;
    }

    /* ── Animations ── */
    @keyframes fadeUp{ from{ opacity:0; transform:translateY(18px); } to{ opacity:1; transform:none; } }
    @keyframes pop{ 0%{ transform:scale(.8); opacity:0; } 65%{ transform:scale(1.06); } 100%{ transform:scale(1); opacity:1; } }
    @keyframes floaty{ 0%,100%{ transform:translateY(0) rotate(0deg); } 50%{ transform:translateY(-9px) rotate(1deg); } }
    @keyframes shake{ 10%,90%{ transform:translateX(-2px); } 20%,80%{ transform:translateX(3px); } 30%,50%,70%{ transform:translateX(-5px); } 40%,60%{ transform:translateX(5px); } }
    @keyframes shimmer{ from{ background-position: -200% center; } to{ background-position: 200% center; } }
    @keyframes pulse-ring{ 0%{ box-shadow: 0 0 0 0 rgba(15,98,254,.4); } 70%{ box-shadow: 0 0 0 14px rgba(15,98,254,0); } 100%{ box-shadow: 0 0 0 0 rgba(15,98,254,0); } }

    .anim-up{ animation:fadeUp .45s cubic-bezier(.22,.8,.22,1) both; }
    .anim-pop{ animation:pop .38s cubic-bezier(.22,.9,.3,1.4) both; }
    .floaty{ animation:floaty 4s ease-in-out infinite; }
    .shake{ animation:shake .42s; }
    .pulse-ring{ animation: pulse-ring 2s cubic-bezier(.5,0,.5,1) infinite; }

    .stagger > *{ animation:fadeUp .45s cubic-bezier(.22,.8,.22,1) both; }
    .stagger > *:nth-child(1){ animation-delay:.03s; }
    .stagger > *:nth-child(2){ animation-delay:.08s; }
    .stagger > *:nth-child(3){ animation-delay:.13s; }
    .stagger > *:nth-child(4){ animation-delay:.18s; }
    .stagger > *:nth-child(5){ animation-delay:.23s; }
    .stagger > *:nth-child(6){ animation-delay:.28s; }
    .stagger > *:nth-child(7){ animation-delay:.33s; }
    .stagger > *:nth-child(8){ animation-delay:.38s; }

    /* ── Lesson path connector ── */
    .node-line::after{
      content:""; position:absolute; left:50%; top:100%; width:3px; height:2.25rem;
      transform:translateX(-50%); border-radius:99px;
      background:repeating-linear-gradient(#c8cde8 0 7px, transparent 7px 13px);
    }
    .node-line.done::after{ background: linear-gradient(#24a148, #0f62fe); }

    /* ── Confetti ── */
    .confetti{ position:fixed; inset:0; pointer-events:none; z-index:60; overflow:hidden; }
    .confetti i{ position:absolute; top:-12px; width:9px; height:14px; border-radius:3px; animation:cf 2.4s linear forwards; }
    @keyframes cf{ to{ transform:translateY(105vh) rotate(640deg); opacity:.9; } }

    /* ── Typing indicator ── */
    .typing span{ display:inline-block; width:7px; height:7px; margin:0 1px; border-radius:99px; background:#9aa2b1; animation:blink 1.2s infinite; }
    .typing span:nth-child(2){ animation-delay:.2s; }
    .typing span:nth-child(3){ animation-delay:.4s; }
    @keyframes blink{ 0%,60%,100%{ opacity:.25; transform:translateY(0); } 30%{ opacity:1; transform:translateY(-3px); } }

    [data-route] > *{ animation:fadeUp .35s ease both; }

    /* ── Hover card lift ── */
    .card-hover{ transition: transform .2s ease, box-shadow .2s ease; }
    .card-hover:hover{ transform: translateY(-3px); box-shadow: 0 20px 48px -12px rgba(13,15,26,.15); }

    /* ── Shimmer skeleton ── */
    .shimmer{
      background: linear-gradient(90deg, #e8eaf0 25%, #f2f4f8 50%, #e8eaf0 75%);
      background-size: 400% 100%;
      animation: shimmer 1.5s infinite;
    }

    /* ── Progress bar gradient ── */
    .progress-fill{
      background: linear-gradient(90deg, #0f62fe, #6929c4);
      border-radius: 99px;
      transition: width .6s cubic-bezier(.4,0,.2,1);
    }

    /* ── Nav item active ── */
    .nav-active{ background: linear-gradient(135deg, #0f62fe, #6929c4); color: white !important; }
    .nav-active svg{ stroke: white !important; }

    /* ── XP badge ── */
    .xp-badge{
      background: linear-gradient(135deg, #f1c21b, #f0a800);
      color: #3d2e00;
      font-weight: 800;
      font-size: .7rem;
      padding: 2px 8px;
      border-radius: 99px;
      letter-spacing: .02em;
    }

    /* ── Input focus ring ── */
    input:focus, select:focus{
      outline: none;
      border-color: #0f62fe !important;
      box-shadow: 0 0 0 4px rgba(15,98,254,.12);
    }

    /* ── Button base ── */
    button{ transition: all .18s ease; }

    /* ── Surface card ── */
    .card{
      background: white;
      border: 1px solid #e2e5f0;
      border-radius: 1.25rem;
      box-shadow: 0 1px 3px rgba(13,15,26,.05), 0 8px 28px -8px rgba(13,15,26,.08);
    }
  </style>
</head>
<body class="text-ink antialiased">
  <div id="app" data-route></div>
  <div id="toast" class="fixed bottom-5 left-1/2 -translate-x-1/2 z-[70] flex flex-col items-center gap-2"></div>
  <script src="./app.js"></script>
</body>
</html>
